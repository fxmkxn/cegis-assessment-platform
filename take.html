<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!--
  CEGIS Assessment Platform - respondent page (public).
  Reached with a link like  take.html?a=<assessment-id>  or  take.html?k=<key>.
  No login. Scoring is done on the server. See README.md for setup.
  img-src includes the public Supabase bucket so objective questions can show
  their uploaded images.
-->
<meta http-equiv="Content-Security-Policy"
  content="default-src 'self';
           script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net;
           style-src 'self' 'unsafe-inline';
           connect-src https://*.supabase.co;
           img-src 'self' data: blob: https://*.supabase.co;
           font-src 'self';">
<meta name="robots" content="noindex, nofollow">
<title>CEGIS Assessment</title>
<link rel="stylesheet" href="assets/app.css">
</head>
<body>

<!-- CEGIS header (same as the internal tool) -->
<header class="site-header">
  <img src="cegis_logo.png" alt="CEGIS" onerror="this.style.display='none'">
  <div>
    <h1>Assessment</h1>
    <p>Centre for Effective Governance of Indian States</p>
  </div>
</header>

<!-- the whole respondent flow renders inside here -->
<main class="main" id="stage" style="flex:1"></main>

<!-- CEGIS footer -->
<footer class="site-footer">
  Designed and developed by the <a href="https://cegis.org" target="_blank" rel="noopener">CEGIS Foundation</a>
  &nbsp;&middot;&nbsp; Assessment Platform
</footer>

<!-- modal + toast mount points -->
<div id="modalRoot"></div>
<div id="toast"></div>

<!-- scripts: config, libraries, shared helpers, loader, then the take logic -->
<script src="assets/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="assets/common.js"></script>
<script src="assets/octopus.js"></script>
<script src="assets/take.js"></script>
</body>
</html>
